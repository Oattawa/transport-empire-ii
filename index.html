<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iron Rails — Transport Empire II</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div id="header">
  <h1>&#x1F682; IRON RAILS — TRANSPORT EMPIRE II</h1>
  <span class="era">16-bit Era Progression · 1850–2000</span>
</div>

<div id="ui-bar">
  <div class="player-tag" id="p1tag" style="border-color:#e04040;color:#e04040;">&#9632; P1: Red Rail Co.</div>
  <div class="player-tag" id="p2tag" style="border-color:#40a0e0;color:#40a0e0;">&#9632; P2: Blue Express</div>
  <div class="player-tag" id="p3tag" style="border-color:#40c060;color:#40c060;">&#9632; P3: Green Lines</div>
  <div class="player-tag" id="p4tag" style="border-color:#e0c040;color:#e0c040;">&#9632; P4: Gold Transit</div>
  <div id="year-display">YEAR: <span id="year-val">1850</span></div>
</div>

<div id="canvas-wrap">
  <canvas id="gameCanvas" width="800" height="520"></canvas>
</div>

<div id="controls">
  <button id="btn-rail"    class="active" onclick="setTool('rail')">&#x1F6E4; Lay Track</button>
  <button id="btn-station"            onclick="setTool('station')">&#x1F3E0; Build Station</button>
  <button id="btn-train"              onclick="setTool('train')">&#x1F682; Place Train</button>
  <button id="btn-erase"              onclick="setTool('erase')">&#x2702; Erase</button>
  <button onclick="advanceYear()">&#x23E9; Advance Year (+10)</button>
  <button onclick="nextPlayer()">&#x25B6; Next Player</button>
  <button onclick="newMap()">&#x1F5FA; New Map</button>
  <button onclick="toggleGrid()">&#x22EF; Toggle Grid</button>
  <button onclick="saveGame()">&#x1F4BE; Save</button>
  <button onclick="loadGame()">&#x1F4C2; Load</button>
  <button id="btn-sound" class="active" onclick="toggleSound()">&#x1F50A; Sound ON</button>
</div>

<div id="status">Click on the map to place rails, stations, or trains.</div>

<div id="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#3a6e2a;"></div>Forest</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#5a8a3a;"></div>Plains</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#8a7850;"></div>Mountains</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#2060b0;"></div>Water</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c8c060;"></div>Desert</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#808080;"></div>&#x1F6E4; Rail Track</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#a06020;"></div>&#x1F3E0; Station</div>
</div>

<div id="notification"></div>

<script src="js/engine.js"></script>
<script src="js/renderer.js"></script>
<script src="js/audio.js"></script>
<script src="js/game.js"></script>
</body>
</html>
